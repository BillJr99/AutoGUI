name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main", "master"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y python3-tk python3-dev scrot

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx pytest-asyncio

      - name: Run regression tests
        run: pytest tests/ -v -m "not user" --ignore=tests/user
        env:
          AUTOGUI_DRY_RUN: "true"
          # Use a clearly-nonexistent filename so api.py takes the
          # env-var-defaults path cleanly without opening a directory.
          AUTOGUI_CONFIG: "__no_config__.json"
          # Suppress display-related errors on headless CI
          DISPLAY: ""

  user-tests:
    # Heavy lane: Docker + Xvfb + Playwright + Ollama. Doesn't gate
    # merges; lets you trigger it explicitly when changing test plumbing.
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[user-tests]')
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build + run test image
        run: bash scripts/test-in-docker.sh --non-interactive --no-llm

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-results
          path: test-results/*.xml
