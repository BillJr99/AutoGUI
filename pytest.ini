[pytest]
testpaths = tests
asyncio_mode = auto
filterwarnings =
    ignore::DeprecationWarning
markers =
    user: end-to-end user-facing tests that boot real subprocesses, Xvfb, and (optionally) a real LLM. Skipped on the default CI lane via -m "not user".
    integration: tests that drive AutoGUI ↔ OSScreenObserver as a wired pair. Requires the OSScreenObserver submodule on disk.
    slow_llm: tests that hit a real chat LLM (Ollama / OpenWebUI / OpenAI / Anthropic). Skip with -m "not slow_llm".
    slow_vlm: tests that hit a real vision LLM. Skip with -m "not slow_vlm".
    needs_display: tests that require a real X11 display (DISPLAY env var must point at an X server, e.g. Xvfb :99).
